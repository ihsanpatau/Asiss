<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Chat — asistenku.pro</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .filter-row{display:flex;gap:8px;overflow-x:auto;margin:14px 0}
  .search-row{display:flex;gap:8px}
  .search-row .input{flex:1}
  .day-label{font-size:12px;color:var(--gray-500);font-weight:700;margin:18px 0 8px}
  .chat-item{border:1px solid var(--gray-200);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px}
  .chat-item .ic{width:38px;height:38px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .chat-item h4{margin:0 0 4px;font-size:13.5px}
  .chat-item p{margin:0;font-size:12px;color:var(--gray-500);line-height:1.4}
  .chat-item .time{font-size:11px;color:var(--gray-400);white-space:nowrap}
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-back">
      <a class="icon-btn" href="doktrai.html">←</a>
      <div>
        <div class="page-title">Riwayat Chat</div>
        <div class="page-sub">Lihat kembali percakapanmu dengan DoktrAI</div>
      </div>
    </div>
  </div>

  <div class="section" style="padding-top:0">
    <div class="filter-row">
      <div class="pill active">💬 Semua</div>
      <div class="pill">🔎 Jawaban Akurat</div>
      <div class="pill">⚡ Cepat & Praktis</div>
    </div>
    <div class="search-row">
      <input class="input" placeholder="🔎  Cari riwayat chat...">
      <button class="btn btn-outline btn-sm">▽ Filter</button>
    </div>

    <div id="listRiwayat">
      <p class="text-sm text-muted text-center mt-24">Memuat riwayat...</p>
    </div>
  </div>

  <div class="bottom-nav" id="bottomNav"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
<script>
  document.getElementById('bottomNav').innerHTML = renderMenuNav('doktrai');

  (async () => {
    const user = await wajibLogin();
    if(!user) return;
    const box = document.getElementById('listRiwayat');
    try{
      const { data } = await supabaseClient.from('chat_messages').select('*')
        .eq('user_id', user.auth.id).eq('room','doktrai').eq('role','user')
        .order('created_at', { ascending:false }).limit(30);

      if(!data || !data.length){
        box.innerHTML = `<p class="text-sm text-muted text-center mt-24">Belum ada riwayat chat. Mulai konsultasi di <a class="link" href="doktrai.html">DoktrAI</a>.</p>`;
        return;
      }
      box.innerHTML = data.map(m => `
        <div class="chat-item">
          <div class="ic">🐱</div>
          <div style="flex:1">
            <h4>${m.content.slice(0,60)}</h4>
            <p>${new Date(m.created_at).toLocaleString('id-ID')}</p>
          </div>
        </div>`).join('');
    }catch(e){
      box.innerHTML = `<p class="text-sm text-muted text-center mt-24">Belum ada riwayat chat.</p>`;
    }
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitur Akademik — asistenku.pro</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-back">
      <a class="icon-btn" href="mahasiswa.html">←</a>
      <div>
        <div class="page-title" id="judulFitur">Fitur</div>
        <div class="page-sub" id="subFitur">Fitur akademik</div>
      </div>
    </div>
  </div>

  <div class="section" style="padding-top:6px">
    <div class="field">
      <label id="labelInput">Judul / Perintah</label>
      <textarea class="input" id="teksInput" rows="4" placeholder="Tulis di sini..."></textarea>
    </div>

    <p class="fw-800 mt-16 mb-8">Upload File (opsional)</p>
    <div class="upload-box">
      <p class="text-sm mb-8">📤 Upload file referensi (PDF, Word, atau TXT)</p>
      <input type="file" id="fileFitur" class="hidden" multiple>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('fileFitur').click()">Pilih File</button>
    </div>

    <button class="btn btn-primary btn-block mt-24" id="btnProses" onclick="prosesFitur()">✨ Proses dengan AI</button>

    <div id="hasilWrap" class="hidden mt-24">
      <div class="card">
        <div class="flex justify-between items-center mb-12">
          <b>Hasil</b>
          <span class="badge badge-green">Selesai</span>
        </div>
        <div id="hasilTeks" style="font-size:13.5px;line-height:1.6;white-space:pre-wrap"></div>
      </div>
      <p class="fw-800 mt-16 mb-8">Download Dokumen</p>
      <div class="grid-2">
        <button class="btn btn-outline btn-sm">📘 Word (.docx)</button>
        <button class="btn btn-outline btn-sm">📕 PDF (.pdf)</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav" id="bottomNav"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
<script>
  document.getElementById('bottomNav').innerHTML = renderMenuNav('mahasiswa');
  wajibLogin();

  const params = new URLSearchParams(window.location.search);
  const nama = params.get('nama') || 'Fitur Akademik';
  const kode = params.get('kode') || 'umum';
  document.getElementById('judulFitur').textContent = nama;
  document.title = nama + ' — asistenku.pro';
  const subInfo = {
    jurnal: ['Buat jurnal baru atau konversi dari skripsi/naskah', 'Judul jurnal atau tempel isi skripsi'],
    makalah: ['Buat makalah akademik dari judul atau file referensi', 'Judul makalah'],
    abstrak: ['Ringkasan penelitian otomatis (Indonesia & Inggris)', 'Tempel isi skripsi/jurnal di sini'],
    parafrase: ['Menulis ulang teks agar bebas plagiarisme', 'Tempel teks yang ingin diparafrase'],
    ppt: ['Buat slide presentasi dari topik atau dokumen', 'Topik atau judul presentasi'],
    tanya: ['Tanya jawab & koreksi tata bahasa skripsi/jurnal', 'Tulis pertanyaanmu'],
  }[kode] || ['Fitur akademik asistenku.pro', 'Tulis perintah di sini'];
  document.getElementById('subFitur').textContent = subInfo[0];
  document.getElementById('labelInput').textContent = subInfo[1];

  async function prosesFitur(){
    const teks = document.getElementById('teksInput').value.trim();
    if(!teks){ tampilkanToast('Isi dulu ya sebelum diproses.'); return; }
    const btn = document.getElementById('btnProses');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Memproses...';
    try{
      const hasil = await panggilAI({ fitur: kode, prompt: teks });
      document.getElementById('hasilTeks').textContent = hasil.text || '';
      document.getElementById('hasilWrap').classList.remove('hidden');
    }catch(err){
      tampilkanToast(err.message);
    }
    btn.disabled = false; btn.textContent = '✨ Proses dengan AI';
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asistenku.pro — Masuk / Daftar</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .auth-wrap{padding:32px 24px 20px;text-align:center}
  .auth-mascot{width:150px;height:150px;margin:18px auto;border-radius:50%;
    background:linear-gradient(135deg,var(--blue-light),#fff);display:flex;align-items:center;
    justify-content:center;font-size:74px;box-shadow:var(--shadow)}
  .tabs{display:flex;background:var(--gray-100);border-radius:14px;padding:4px;margin:20px 24px}
  .tabs button{flex:1;padding:11px;border:none;background:transparent;border-radius:11px;font-weight:700;color:var(--gray-500);font-size:14px}
  .tabs button.active{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
  .form-panel{padding:0 24px 24px}
  .or-divider{display:flex;align-items:center;gap:12px;color:var(--gray-400);font-size:12.5px;margin:18px 0}
  .or-divider::before,.or-divider::after{content:"";flex:1;height:1px;background:var(--gray-200)}
  .feature-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:20px 20px 30px;text-align:center}
  .feature-strip div p{font-size:11px;font-weight:700;margin:6px 0 2px;color:var(--navy)}
  .feature-strip div span{font-size:10px;color:var(--gray-500)}
  .feature-strip .ic{width:38px;height:38px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;margin:0 auto;color:var(--blue)}
</style>
</head>
<body>
<div class="app-shell" style="padding-bottom:0">

  <div class="auth-wrap">
    <div class="brand" style="justify-content:center;display:flex;gap:2px">asistenku<span class="dot">.pro</span></div>
    <p class="text-muted text-sm mt-8">Asisten AI pintar untuk membantu tugas akademik dan profesionalmu.</p>
    <div class="auth-mascot">🐱🎓</div>
  </div>

  <div class="tabs">
    <button id="tabMasuk" class="active" onclick="pindahTab('masuk')">Masuk</button>
    <button id="tabDaftar" onclick="pindahTab('daftar')">Daftar</button>
  </div>

  <!-- FORM MASUK -->
  <div class="form-panel" id="panelMasuk">
    <button class="btn-social mt-8" onclick="klikGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.3 29.4 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.3 2.7l6-6C33.9 6.5 29.2 4.5 24 4.5 12.9 4.5 4 13.4 4 24.5s8.9 20 20 20 20-8.9 20-20c0-1.4-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c2.8 0 5.3 1 7.3 2.7l6-6C33.9 6.5 29.2 4.5 24 4.5c-7.4 0-13.8 4.1-17.1 10.2z"/><path fill="#4CAF50" d="M24 44.5c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2c-2 1.4-4.5 2.3-7.2 2.3-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.9 40.2 16.4 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.9 2.5-2.5 4.5-4.6 5.9l6.2 5.2C40.8 36 44 30.7 44 24.5c0-1.4-.1-2.7-.4-4z"/></svg>
      Masuk dengan Google
    </button>
    <div class="or-divider">atau</div>
    <form onsubmit="return prosesMasuk(event)">
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" id="masukEmail" placeholder="nama@email.com" required>
      </div>
      <div class="field">
        <label>Kata sandi</label>
        <input class="input" type="password" id="masukPassword" placeholder="Kata sandi" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="btnMasuk">Masuk</button>
    </form>
    <p class="text-center text-sm text-muted mt-16">Belum punya akun? <a class="link" onclick="pindahTab('daftar')">Daftar di sini</a></p>
  </div>

  <!-- FORM DAFTAR -->
  <div class="form-panel hidden" id="panelDaftar">
    <button class="btn-social mt-8" onclick="klikGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.3 29.4 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.3 2.7l6-6C33.9 6.5 29.2 4.5 24 4.5 12.9 4.5 4 13.4 4 24.5s8.9 20 20 20 20-8.9 20-20c0-1.4-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c2.8 0 5.3 1 7.3 2.7l6-6C33.9 6.5 29.2 4.5 24 4.5c-7.4 0-13.8 4.1-17.1 10.2z"/><path fill="#4CAF50" d="M24 44.5c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2c-2 1.4-4.5 2.3-7.2 2.3-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.9 40.2 16.4 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.9 2.5-2.5 4.5-4.6 5.9l6.2 5.2C40.8 36 44 30.7 44 24.5c0-1.4-.1-2.7-.4-4z"/></svg>
      Daftar dengan Google
    </button>
    <div class="or-divider">atau</div>
    <form onsubmit="return prosesDaftar(event)">
      <div class="field">
        <label>Nama lengkap</label>
        <input class="input" type="text" id="daftarNama" placeholder="Nama lengkap" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" id="daftarEmail" placeholder="nama@email.com" required>
      </div>
      <div class="field">
        <label>Kata sandi</label>
        <input class="input" type="password" id="daftarPassword" placeholder="Minimal 6 karakter" required minlength="6">
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="btnDaftar">Daftar</button>
    </form>
    <p class="text-center text-sm text-muted mt-16">Sudah punya akun? <a class="link" onclick="pindahTab('masuk')">Masuk di sini</a></p>
  </div>

  <div class="feature-strip">
    <div><div class="ic">🛡️</div><p>Aman</p><span>Data & privasi terjamin</span></div>
    <div><div class="ic">⚡</div><p>Cepat</p><span>Hitungan detik</span></div>
    <div><div class="ic">🎓</div><p>Cerdas</p><span>AI terdepan</span></div>
    <div><div class="ic">💬</div><p>Serba Bisa</p><span>Akademik & kerja</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
<script>
  function pindahTab(tab){
    document.getElementById('tabMasuk').classList.toggle('active', tab==='masuk');
    document.getElementById('tabDaftar').classList.toggle('active', tab==='daftar');
    document.getElementById('panelMasuk').classList.toggle('hidden', tab!=='masuk');
    document.getElementById('panelDaftar').classList.toggle('hidden', tab!=='daftar');
  }

  async function prosesMasuk(e){
    e.preventDefault();
    const btn = document.getElementById('btnMasuk');
    btn.disabled = true; btn.textContent = 'Memproses...';
    try{
      await masukAkun({
        email: document.getElementById('masukEmail').value,
        password: document.getElementById('masukPassword').value
      });
      window.location.href = 'dashboard.html';
    }catch(err){
      tampilkanToast(err.message || 'Gagal masuk. Periksa email/kata sandi.');
      btn.disabled = false; btn.textContent = 'Masuk';
    }
    return false;
  }

  async function prosesDaftar(e){
    e.preventDefault();
    const btn = document.getElementById('btnDaftar');
    btn.disabled = true; btn.textContent = 'Memproses...';
    try{
      await daftarAkun({
        nama: document.getElementById('daftarNama').value,
        email: document.getElementById('daftarEmail').value,
        password: document.getElementById('daftarPassword').value
      });
      tampilkanToast('Akun berhasil dibuat! Silakan cek email untuk verifikasi.');
      pindahTab('masuk');
    }catch(err){
      tampilkanToast(err.message || 'Gagal mendaftar.');
    }
    btn.disabled = false; btn.textContent = 'Daftar';
    return false;
  }

  async function klikGoogle(){
    try{ await masukGoogle(); }
    catch(err){ tampilkanToast(err.message || 'Login Google gagal.'); }
  }

  // Jika sudah login, langsung ke dashboard
  (async () => {
    const user = await ambilUserSaatIni();
    if(user) window.location.href = 'dashboard.html';
  })();
</script>
</body>
</html>
